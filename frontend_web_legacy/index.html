<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCore - UAT Workshop Discovery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #004E89 0%, #FF6B35 100%); padding: 40px;">
            
            <!-- Logo Placeholder -->
            <div style="width: 150px; height: 150px; background-color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);">
                <div style="font-size: 60px; color: #FF6B35;">🎓</div>
            </div>

            <!-- App Name -->
            <h1 style="color: white; font-size: 36px; font-weight: 700; margin-bottom: 10px; text-align: center;">DevCore</h1>
            <p style="color: rgba(255, 255, 255, 0.9); font-size: 16px; margin-bottom: 50px; text-align: center;">Workshop Discovery Value</p>

            <!-- Tagline -->
            <p style="color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 40px; text-align: center; max-width: 280px;">
                Tu plataforma universitaria integral
            </p>

            <!-- Buttons -->
            <div style="width: 100%; max-width: 300px;">
                <a href="login.html" class="btn btn-primary" style="margin-bottom: 15px;">Iniciar Sesión</a>
                <a href="register.html" class="btn btn-outline" style="background-color: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white;">Registrarse</a>
            </div>

            <!-- Footer -->
            <p style="color: rgba(255, 255, 255, 0.6); font-size: 12px; margin-top: 60px; text-align: center;">
                © 2026 DevCore Team<br>
                Universidad Autónoma de Tamaulipas
            </p>
        </div>
    </div>
</body>
</html>
